```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CryptoBox - Password Strength Checker</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1 class="logo">CRYPTOBOX</h1>

    <p class="subtitle">
        Password Security Analyzer v2.6
    </p>

    <div class="tabs">
        <button class="tab active">Strength Checker</button>
        <button class="tab">Generator</button>
        <button class="tab">Breach DB</button>
    </div>

    <!-- Password Checker -->

    <div class="panel">

        <h2>Analyze Password</h2>

        <input
            type="password"
            id="password"
            placeholder="Enter Password..."
        >

        <div class="progress">
            <div
                class="progress-bar"
                id="progressBar">
            </div>
        </div>

        <br>

        <h3 id="strengthText">
            WEAK
        </h3>

        <div class="stats">

            <div class="card">
                <h3 id="entropy">0</h3>
                <p>Entropy</p>
            </div>

            <div class="card">
                <h3 id="length">0</h3>
                <p>Length</p>
            </div>

            <div class="card">
                <h3 id="crack">-</h3>
                <p>Crack Time</p>
            </div>

            <div class="card">
                <h3 id="score">0</h3>
                <p>Score</p>
            </div>

            <div class="card">
                <h3 id="breachStatus">SAFE</h3>
                <p>Breach Check</p>
            </div>

        </div>

        <div class="checks">

            <p id="c1" class="invalid">
                ✖ Min 8 Characters
            </p>

            <p id="c2" class="invalid">
                ✖ Uppercase Letter
            </p>

            <p id="c3" class="invalid">
                ✖ Lowercase Letter
            </p>

            <p id="c4" class="invalid">
                ✖ Number
            </p>

            <p id="c5" class="invalid">
                ✖ Special Symbol
            </p>

        </div>

    </div>

    <br>

    <!-- Password Generator -->

    <div class="panel">

        <h2>Password Generator</h2>

        <input
            type="text"
            id="generatedPassword"
            readonly
            placeholder="Generated Password"
        >

        <br><br>

        <button
            class="btn"
            id="generateBtn">

            Generate Password

        </button>

    </div>

</div>

<script src="js/strength.js"></script>
<script src="js/generator.js"></script>
<script src="js/breach.js"></script>

</body>
</html>
```
