<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoBox</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<h1 class="logo">CRYPTOBOX</h1>
<p class="subtitle">Cyber Password Strength Checker</p>

<div class="panel">

<h2>Password Analyzer</h2>

<input
type="password"
id="password"
placeholder="Enter Password..."
>

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<h3 id="strengthText">WEAK</h3>

<div class="stats">

<div class="card">
<h3 id="score">0</h3>
<p>Score</p>
</div>

<div class="card">
<h3 id="length">0</h3>
<p>Length</p>
</div>

<div class="card">
<h3 id="entropy">0</h3>
<p>Entropy</p>
</div>

<div class="card">
<h3 id="crack">-</h3>
<p>Crack Time</p>
</div>

<div class="card">
<h3 id="breachStatus">SAFE</h3>
<p>Breach Check</p>
</div>

</div>

<div class="checks">

<p id="c1">✖ Min 8 Characters</p>
<p id="c2">✖ Uppercase Letter</p>
<p id="c3">✖ Lowercase Letter</p>
<p id="c4">✖ Number</p>
<p id="c5">✖ Special Symbol</p>

</div>

</div>

<br>

<div class="panel">

<h2>Password Generator</h2>

<input
type="text"
id="generatedPassword"
readonly
placeholder="Generated Password"
>

<br><br>

<button
class="btn"
id="generateBtn">

Generate Password

</button>

</div>

</div>

<script src="js/strength.js"></script>
<script src="js/generator.js"></script>

</body>
</html>
